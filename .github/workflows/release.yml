name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Enable Corepack
        run: corepack enable

      - name: Activate Yarn
        run: corepack prepare yarn@4.0.2 --activate

      - name: Install
        run: corepack yarn install --immutable

      - name: Release Build
        run: corepack yarn release

      - name: Detect Tag Prefix
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ "$TAG" == v* ]]; then
            echo "TAG_PREFIX=v" >> "$GITHUB_ENV"
          else
            echo "TAG_PREFIX=" >> "$GITHUB_ENV"
          fi

      - name: Generate Release Notes (Conventional Commits)
        run: |
          node ./node_modules/.bin/conventional-changelog -p angular -r 1 --tag-prefix "${TAG_PREFIX}" > release-notes.txt
          if [ ! -s release-notes.txt ]; then
            echo "Release notes were empty; falling back to commit list."
            if [ -n "${TAG_PREFIX}" ]; then
              PREV_TAG=$(git describe --tags --abbrev=0 --match "${TAG_PREFIX}*" HEAD^ 2>/dev/null || true)
            else
              PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || true)
            fi
            echo "## Changes" > release-notes.txt
            if [ -n "$PREV_TAG" ]; then
              git log --pretty=format:"- %s (%h)" "$PREV_TAG"..HEAD >> release-notes.txt
            else
              git log --pretty=format:"- %s (%h)" >> release-notes.txt
            fi
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.txt
          files: comic-scroller-*.zip

      - name: Upload Zip
        uses: actions/upload-artifact@v4
        with:
          name: comic-scroller
          path: comic-scroller-*.zip
